services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sigetic_test
      POSTGRES_USER: sigetic_app
      POSTGRES_PASSWORD: sigetic_test_password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigetic_app -d sigetic_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./sigetic-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SigeticDatabase: Host=db;Port=5432;Database=sigetic_test;Username=sigetic_app;Password=sigetic_test_password
      Jwt__Issuer: SIGETIC.Api
      Jwt__Audience: SIGETIC.Web
      Jwt__SecretKey: SIGETIC_TEST_SECRET_KEY_1234567890_SIGETIC_TEST_SECRET_KEY_1234567890
      Jwt__ExpirationMinutes: 480
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: http://localhost:3100
    ports:
      - "58080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./sigetic-web
      args:
        NEXT_PUBLIC_API_URL: http://api:8080
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SIGETIC_INTERNAL_API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: http://api:8080
    ports:
      - "3100:3000"
    depends_on:
      - api
