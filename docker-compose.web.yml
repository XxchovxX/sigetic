services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sigetic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./sigetic-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SigeticDatabase: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      Database__ApplyMigrationsOnStartup: "true"
      Cors__AllowedOrigins__0: https://${SIGETIC_DOMAIN}
      Cors__AllowedOrigins__1: http://${SIGETIC_DOMAIN}
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUser: ${EMAIL_SMTP_USER:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-}
      Email__FromName: ${EMAIL_FROM_NAME:-SIGETIC}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL:-true}
      Email__TicketRecipients: ${EMAIL_TICKET_RECIPIENTS:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./sigetic-web
      args:
        NEXT_PUBLIC_API_URL: http://api:8080
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SIGETIC_INTERNAL_API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: http://api:8080
    depends_on:
      - api

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SIGETIC_DOMAIN: ${SIGETIC_DOMAIN}
    volumes:
      - ./deploy/web/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  sigetic_db_data:
  caddy_data:
  caddy_config:
